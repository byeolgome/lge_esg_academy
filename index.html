<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>AI 활용능력 테스트</title>
<style>
@font-face {
    font-family: 'NeoDunggeunmo';
    src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_2001@1.3/NeoDunggeunmo.woff') format('woff');
    font-weight: normal;
    font-style: normal;
}
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
:root {
  --g1:#0f5c35; --g2:#1e8a52; --g3:#3ab870; --g4:#a8f0c6; --g5:#e8faf1;
  --black:#0c0c0c; --gray1:#2a2a2a; --gray2:#5a5a5a; --gray3:#b0b0b0;
  --gray4:#e4e4e4; --white:#ffffff;
  --fko:'NeoDunggeunmo', cursive, sans-serif;
  --fmono:'NeoDunggeunmo', monospace;
  /* 픽셀 UI 컬러 */
  --win-bg: #f0f0f0;
  --win-bar: #d4d4d4;
  --win-border: #000000;
  --green-box: #b4e0b4;
  --green-box-border: #4a754a;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{
  font-family:var(--fko);
  /* 하늘색-민트색 파스텔 배경 */
  background: linear-gradient(180deg, #c4e9f2 0%, #d4f0df 100%);
  color:var(--black);
  min-height:100vh;display:flex;align-items:flex-start;justify-content:center;
  padding:24px 16px 56px;overflow-x:hidden;position:relative;
}

/* 도트 무늬 배경 장식 */
body::before{
  content:''; position:fixed; inset:0;
  background-image: radial-gradient(#ffffff 2px, transparent 2px);
  background-size: 40px 40px; opacity: 0.3; z-index: 0; pointer-events: none;
}

/* 화면 공통 */
.screen{width:100%;max-width:520px;position:relative;z-index:1;display:none}
.screen.active{display:block;animation:fadeUp .4s ease-out both}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}

/* ── 1. 시작 화면 (픽셀 윈도우 UI) ── */
.pixel-window {
  border: 4px solid var(--win-border);
  background: var(--win-bg);
  box-shadow: 6px 6px 0 rgba(0,0,0,0.15);
  border-radius: 4px; overflow: hidden;
  margin-top: 20px;
}
.window-top-bar {
  background: var(--win-bar);
  border-bottom: 4px solid var(--win-border);
  display: flex; align-items: center; padding: 10px 14px;
}
.window-top-bar .dots {
  display: flex; gap: 6px; margin-right: 14px;
}
.window-top-bar .dot {
  width: 12px; height: 12px; border: 2px solid var(--win-border); background: #fff;
}
.window-top-bar .dot.red { background: #ff5f56; }
.window-top-bar .dot.yellow { background: #ffbd2e; }
.window-top-bar .dot.green { background: #27c93f; }

.window-title {
  font-size: 14px; color: #333; text-align: center; flex: 1; letter-spacing: -0.05em;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis; padding-right: 40px;
}

.window-body {
  padding: 30px 20px; background: #fff;
  border: 4px solid var(--win-border);
  margin: 16px; border-radius: 8px;
  position: relative;
}

/* 일러스트 영역 */
.hero-illustration {
  position: relative; height: 160px; display: flex; justify-content: center; align-items: center; margin-bottom: 30px;
}
.floating-icon {
  position: absolute; font-size: 24px; animation: float 3s ease-in-out infinite; color: var(--g1);
}
@keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-8px)} }
.icon-chip1 { top: 20px; left: 20px; font-size: 28px; animation-delay: 0s;}
.icon-chip2 { bottom: 20px; right: 30px; font-size: 28px; animation-delay: 1s;}
.icon-q { top: 10px; right: 50px; font-size: 32px; color: #555; animation-delay: 0.5s;}
.icon-bulb { bottom: 30px; left: 40px; font-size: 28px; color: #f5b041; animation-delay: 1.5s;}

/* 로봇 캐릭터 */
.robot-char {
  width: 100px; height: 110px; background: #e0e0e0;
  border: 4px solid var(--win-border); border-radius: 20px 20px 10px 10px;
  position: relative; z-index: 2; box-shadow: 4px 4px 0 rgba(0,0,0,0.1);
  display: flex; flex-direction: column; align-items: center; justify-content: flex-start;
  padding-top: 14px;
}
.robot-antenna {
  position: absolute; top: -16px; left: 50%; transform: translateX(-50%);
  width: 8px; height: 16px; background: #999; border: 3px solid var(--win-border);
}
.robot-antenna::before {
  content:''; position:absolute; top:-8px; left:-4px; width:10px; height:10px;
  background: var(--g1); border: 3px solid var(--win-border); border-radius: 50%;
}
.robot-face {
  width: 70px; height: 40px; background: #111; border: 4px solid var(--win-border);
  border-radius: 10px; display: flex; justify-content: center; align-items: center; gap: 12px;
}
.robot-eye {
  width: 12px; height: 14px; background: #fff; border-radius: 40%;
}
.robot-mouth {
  width: 16px; height: 4px; background: #fff; border-radius: 2px; margin-top: 6px;
}
.robot-logo {
  margin-top: 12px; font-size: 11px; font-weight: bold; color: #800020; text-align: center; line-height: 1.2;
}

/* 입력/버튼 영역 (초록색 상자) */
.action-row {
  display: flex; gap: 16px; justify-content: center;
}
.green-box {
  flex: 1; height: 54px; background: var(--green-box);
  border: 4px solid var(--win-border); border-radius: 8px;
  box-shadow: 4px 4px 0 rgba(0,0,0,0.15);
  display: flex; align-items: center; justify-content: center;
  position: relative; overflow: hidden;
}
.name-input {
  width: 100%; height: 100%; border: none; background: transparent;
  text-align: center; font-family: var(--fko); font-size: 16px; color: var(--win-border); outline: none;
}
.name-input::placeholder { color: #5a8a5a; }
.btn-start {
  width: 100%; height: 100%; border: none; background: transparent;
  font-family: var(--fko); font-size: 18px; color: var(--win-border); cursor: pointer;
}
.btn-start:disabled { color: #888; cursor: not-allowed; }
.btn-start:active:not(:disabled) { background: #a2d2a2; }

/* ── 2~4. 테스트, 로딩, 결과 화면 (픽셀 감성 적용) ── */
.card {
  background: var(--white); border: 4px solid var(--win-border); border-radius: 8px;
  box-shadow: 6px 6px 0 rgba(0,0,0,0.15); padding: 30px 20px;
}
.progress-top { display: flex; justify-content: space-between; margin-bottom: 12px; font-size: 14px; }
.progress-cat { color: var(--g1); }
.pbar-bg { height: 12px; background: var(--gray4); border: 3px solid var(--win-border); border-radius: 6px; overflow: hidden; }
.pbar-fill { height: 100%; background: var(--g1); transition: width 0.4s; }
.q-num { font-size: 14px; color: var(--gray3); margin: 20px 0 10px; }
.q-text { font-size: 20px; line-height: 1.4; color: var(--black); margin-bottom: 30px; min-height: 60px; }
.choice-btn {
  width: 100%; padding: 16px; border: 3px solid var(--win-border); border-radius: 8px;
  background: var(--white); font-family: var(--fko); font-size: 15px; text-align: left;
  cursor: pointer; display: flex; align-items: center; gap: 12px; margin-bottom: 12px;
  box-shadow: 4px 4px 0 rgba(0,0,0,0.1); transition: 0.1s;
}
.choice-btn:hover { background: var(--g5); transform: translateY(-2px); box-shadow: 6px 6px 0 rgba(0,0,0,0.15); }
.choice-btn:active { transform: translateY(2px); box-shadow: 0 0 0; }
.cb { width: 28px; height: 28px; border: 3px solid var(--win-border); background: #fff; color: var(--g1); display: flex; align-items: center; justify-content: center; font-size: 14px; }

/* 결과 화면 */
.result-hero { background: var(--g1); color: var(--white); padding: 30px 20px; text-align: center; border-bottom: 4px solid var(--win-border); }
.rh-code { font-size: 40px; margin-bottom: 10px; text-shadow: 3px 3px 0 rgba(0,0,0,0.3); }
.rh-name { font-size: 22px; margin-bottom: 10px; }
.rh-greet { font-size: 14px; opacity: 0.9; }
.result-body { padding: 24px 20px; }
.sec-title { font-size: 16px; color: var(--g1); margin-bottom: 14px; border-bottom: 2px dashed var(--gray4); padding-bottom: 8px; }
.desc-box, .env-box { border: 3px solid var(--win-border); border-radius: 6px; padding: 16px; margin-bottom: 20px; font-size: 15px; line-height: 1.6; }
.desc-box { background: var(--g5); }
.env-box { background: #fff; }
.env-level { font-size: 18px; color: var(--g1); margin-bottom: 8px; }
.tips-list { list-style: none; margin-bottom: 20px; display: flex; flex-direction: column; gap: 12px; font-size: 14px; line-height: 1.5; }
.tips-list li { display: flex; gap: 10px; }
.tn { width: 24px; height: 24px; flex-shrink: 0; background: var(--g1); color: #fff; border: 2px solid var(--win-border); display: flex; align-items: center; justify-content: center; font-size: 12px; }
.closing-box { text-align: center; padding: 16px; background: var(--gray4); border: 3px solid var(--win-border); font-size: 14px; margin-bottom: 10px; }
.watermark { text-align: center; font-size: 12px; color: var(--gray3); padding: 10px 0; }

.share-btn-save {
  width: 100%; padding: 16px; background: var(--g1); color: #fff; border: 4px solid var(--win-border);
  font-family: var(--fko); font-size: 18px; cursor: pointer; box-shadow: 4px 4px 0 rgba(0,0,0,0.2);
  margin-bottom: 12px;
}
.share-row { display: flex; gap: 10px; margin-bottom: 12px; }
.share-row button {
  flex: 1; padding: 14px; border: 3px solid var(--win-border); font-family: var(--fko); font-size: 14px;
  cursor: pointer; box-shadow: 3px 3px 0 rgba(0,0,0,0.15); display: flex; flex-direction: column; align-items: center; gap: 6px;
}
.share-btn-kakao { background: #fee500; color: #000; }
.share-btn-insta { background: #fff; color: #000; }
.share-btn-copy { background: #e0e0e0; color: #000; }
.retry-btn { width: 100%; padding: 14px; background: transparent; border: 3px dashed var(--win-border); font-family: var(--fko); font-size: 16px; cursor: pointer; }

/* 로딩 애니메이션 */
.loading-card { text-align: center; padding: 60px 20px; }
.spinner { font-size: 50px; margin-bottom: 20px; animation: bounce 1s infinite alternate; }
@keyframes bounce { from { transform: translateY(0); } to { transform: translateY(-20px); } }

/* 토스트 */
.toast {
  position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: var(--win-border);
  color: #fff; padding: 12px 24px; font-size: 14px; border-radius: 4px; opacity: 0; pointer-events: none; transition: 0.3s; z-index: 999;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(-10px); }
</style>
</head>
<body>

<div class="toast" id="toast"></div>

<div class="screen active" id="screen-start">
  <div class="pixel-window">
    <div class="window-top-bar">
      <div class="dots">
        <span class="dot red"></span><span class="dot yellow"></span><span class="dot green"></span>
      </div>
      <div class="window-title">당신의 AI 사용 습관, 환경에 어떤 영향을 줄까요?</div>
    </div>
    <div class="window-body">
      <div class="hero-illustration">
        <div class="floating-icon icon-chip1">🖧</div>
        <div class="floating-icon icon-chip2">🖧</div>
        <div class="floating-icon icon-q">❓</div>
        <div class="floating-icon icon-bulb">💡</div>
        
        <div class="robot-char">
          <div class="robot-antenna"></div>
          <div class="robot-face">
            <div class="robot-eye"></div>
            <div class="robot-eye"></div>
          </div>
          <div class="robot-logo">ESG<br>Academy</div>
        </div>
      </div>
      
      <div class="action-row">
        <div class="green-box">
          <input type="text" id="nameInput" class="name-input" placeholder="이름 입력" maxlength="10" autocomplete="off"/>
        </div>
        <div class="green-box">
          <button class="btn-start" id="startBtn" disabled onclick="startTest()">시작하기</button>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="screen" id="screen-test">
  <div class="card">
    <div class="progress-wrap">
      <div class="progress-top">
        <span class="progress-cat" id="progressCat">상황 판단</span>
        <span class="progress-num" id="progressNum">1 / 20</span>
      </div>
      <div class="pbar-bg"><div class="pbar-fill" id="pbarFill" style="width:5%"></div></div>
    </div>
    <div class="q-num" id="qNum">Q 01</div>
    <p class="q-text" id="qText"></p>
    <div class="choices">
      <button class="choice-btn" id="choiceA" onclick="selectChoice(0)">
        <span class="cb">A</span><span id="choiceATxt"></span>
      </button>
      <button class="choice-btn" id="choiceB" onclick="selectChoice(1)">
        <span class="cb">B</span><span id="choiceBTxt"></span>
      </button>
    </div>
  </div>
</div>

<div class="screen" id="screen-loading">
  <div class="card loading-card">
    <div class="spinner">⏳</div>
    <h2 style="font-size:20px; margin-bottom:10px;">결과 분석 중...</h2>
    <p style="font-size:14px; color:#555;">AI 사용 패턴을 계산하고 있어요</p>
  </div>
</div>

<div class="screen" id="screen-result">
  <div id="result-capture" style="border: 4px solid #000; border-radius: 8px; overflow: hidden;">
    <div class="result-hero">
      <div class="rh-code" id="rTypeCode">FEPC</div>
      <div class="rh-name" id="rTypeName">🌿 그린 파워유저</div>
      <div class="rh-greet" id="rGreet">김그린님의 AI 활용 유형</div>
    </div>
    <div class="result-body">
      <div class="sec-title">▶ 유형 설명</div>
      <div class="desc-box">
        <div style="font-weight:bold; color:var(--g1); margin-bottom:8px;" id="rAnalogy"></div>
        <div id="rPattern" style="margin-bottom:8px;"></div>
        <div id="rPunch" style="color:#666; font-size:13px;"></div>
      </div>

      <div class="sec-title">▶ 환경 영향</div>
      <div class="env-box">
        <div class="env-level" id="rImpact"></div>
        <div id="rWater"></div>
        <div style="font-size: 24px; margin-top:10px; letter-spacing: 2px;" id="rDropBar"></div>
      </div>

      <div class="sec-title">▶ 개선 팁</div>
      <ul class="tips-list" id="rTips"></ul>

      <div class="closing-box" id="rClosing"></div>
      
      <div class="watermark">LG ESG 대학생 아카데미 '지니어스'</div>
    </div>
  </div>

  <div class="share-area">
    <button class="share-btn-save" onclick="saveImage()">📸 이미지로 저장하기</button>
    <div class="share-row">
      <button class="share-btn-kakao" onclick="shareKakao()">💬<br>카톡 공유</button>
      <button class="share-btn-insta" onclick="shareInsta()">📷<br>인스타 공유</button>
      <button class="share-btn-copy" onclick="copyLink()">🔗<br>링크 복사</button>
    </div>
    <button class="retry-btn" onclick="retryTest()">↩ 처음으로 돌아가기</button>
  </div>
</div>

<script>
// --- 데이터 및 로직 ---
let userName='', currentQ=0, resultType='';
let scores={F:0,R:0,E:0,I:0,P:0,L:0,C:0,U:0};
const SHARE_URL='https://your-github-pages-url.github.io'; 

const questions=[
  {cat:'상황 판단',text:'과제나 기획안 작성을 시작할 때, 가장 먼저 하는 행동은?',choices:[{txt:'일단 AI(ChatGPT 등)를 켜두고 무엇이든 물어보며 시작한다',score:'F'},{txt:'빈 화면에 내 생각을 먼저 정리하고, 막힐 때 AI를 찾는다',score:'R'}]},
  {cat:'상황 판단',text:'문서나 이메일을 작성해야 할 때 나의 스타일은?',choices:[{txt:'처음부터 AI에게 초안을 잡아달라고 맡기는 편이다',score:'F'},{txt:'내가 먼저 쓰고, 문맥을 다듬을 때만 AI를 활용한다',score:'R'}]},
  {cat:'상황 판단',text:'간단한 개념이나 단어의 뜻이 궁금해졌을 때?',choices:[{txt:'대화형 AI에게 물어보고 맥락까지 설명해달라고 한다',score:'F'},{txt:'가벼운 정보는 그냥 구글링이나 포털 검색으로 빠르게 찾는다',score:'R'}]},
  {cat:'상황 판단',text:'오늘 하루 동안 AI 서비스를 켠 횟수는?',choices:[{txt:'셀 수 없다. 수시로 탭을 왔다 갔다 하며 사용했다',score:'F'},{txt:'필요할 때 한두 번 정도 몰아서 접속했다',score:'R'}]},
  {cat:'상황 판단',text:'번뜩이는 아이디어가 필요할 때 나는?',choices:[{txt:'AI에게 여러 가지 키워드를 던져주고 아이디어를 내보라고 한다',score:'F'},{txt:'혼자 먼저 고민해보고, 정 안 풀릴 때 AI에게 힌트를 얻는다',score:'R'}]},
  {cat:'행동 방식',text:'AI에게 무언가를 부탁할 때 첫 질문(프롬프트)의 형태는?',choices:[{txt:'배경, 조건, 원하는 형식을 꼼꼼히 적어서 한 번에 준다',score:'E'},{txt:'일단 핵심만 짧게 던지고, 답변을 보면서 추가로 요구한다',score:'I'}]},
  {cat:'행동 방식',text:'AI가 엉뚱한 대답을 내놓았을 때 나의 대처법은?',choices:[{txt:'질문이 명확하지 않았다고 생각하고 프롬프트를 구체적으로 수정한다',score:'E'},{txt:'"아니 그거 말고", "다시 해봐"라며 대화로 계속 맞춰간다',score:'I'}]},
  {cat:'행동 방식',text:'원하는 결과물을 얻기까지 AI와 대화하는 횟수는?',choices:[{txt:'보통 1~2번의 질문 안에 원하는 완벽한 답변을 얻어낸다',score:'E'},{txt:'여러 번 티키타카(핑퐁)를 해야 겨우 쓸만한 게 나온다',score:'I'}]},
  {cat:'행동 방식',text:'자주 쓰는 질문이나 보고서 양식이 있다면?',choices:[{txt:'따로 프롬프트 템플릿을 저장해두고 복붙해서 효율적으로 쓴다',score:'E'},{txt:'매번 그때그때 생각나는 대로 타이핑해서 묻는다',score:'I'}]},
  {cat:'행동 방식',text:'AI의 답변이 너무 길고 장황하게 나왔을 때 나는?',choices:[{txt:'다음부턴 "3줄로 요약해" 등 제약을 미리 건다',score:'E'},{txt:'일단 받은 뒤에 "너무 길어, 짧게 줄여줘"라고 시킨다',score:'I'}]},

// 화면 전환
function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  const t = document.getElementById(id);
  void t.offsetWidth; 
  t.classList.add('active');
  window.scrollTo({top:0, behavior:'smooth'});
}

// 질문 렌더링
function renderQ(){
  const q = questions[currentQ];
  const pct = Math.round((currentQ/questions.length)*100) + 2;
  document.getElementById('progressCat').textContent = q.cat;
  document.getElementById('progressNum').textContent = `${currentQ+1} / ${questions.length}`;
  document.getElementById('pbarFill').style.width = pct + '%';
  document.getElementById('qNum').textContent = `Q ${String(currentQ+1).padStart(2,'0')}`;
  document.getElementById('qText').textContent = q.text;
  document.getElementById('choiceATxt').textContent = q.choices[0].txt;
  document.getElementById('choiceBTxt').textContent = q.choices[1].txt;
  
  const a = document.getElementById('choiceA'), b = document.getElementById('choiceB');
  a.classList.remove('selected'); b.classList.remove('selected');
  a.disabled = false; b.disabled = false;
}

  if(idx === 0) a.classList.add('selected'); else b.classList.add('selected');
  a.disabled = true; b.disabled = true;
  scores[q.choices[idx].score]++;
  
  setTimeout(() => {
    currentQ++;
    if(currentQ < questions.length){
      renderQ();
    } else {
      document.getElementById('pbarFill').style.width = '100%';
      setTimeout(() => { showScreen('screen-loading'); setTimeout(showResult, 1800); }, 300);
    }
  }, 350);
}

// 결과 계산 및 표시
function showResult(){
  resultType = (scores.F>=scores.R?'F':'R')+(scores.E>=scores.I?'E':'I')+(scores.P>=scores.L?'P':'L')+(scores.C>=scores.U?'C':'U');
  const d = resultData[resultType];
  
  document.getElementById('rTypeCode').textContent = resultType;
  document.getElementById('rTypeName').textContent = `${d.emoji} ${d.title}`;
  document.getElementById('rGreet').textContent = `${userName}님의 AI 활용 유형`;
  document.getElementById('rAnalogy').textContent = d.analogy;
  document.getElementById('rPattern').textContent = d.pattern;
  document.getElementById('rPunch').textContent = `"${d.punch}"`;
  document.getElementById('rImpact').textContent = d.impact;
  document.getElementById('rWater').innerHTML = `AI 요청 처리 시 물이 소모된다는 사실 아시나요?<br>당신의 습관은 <strong>${d.water}</strong> 수준입니다.`;
  document.getElementById('rClosing').textContent = d.closing;

  // 물방울 생성
  let dropsHTML = '';
  for(let i=0; i<10; i++) dropsHTML += (i < d.drops) ? '💧' : '<span style="opacity:0.2">💧</span>';
  document.getElementById('rDropBar').innerHTML = dropsHTML;

  // 팁 생성
  const tl = document.getElementById('rTips');
  tl.innerHTML = '';
  d.tips.forEach((t, i) => {
    const li = document.createElement('li');
    li.innerHTML = `<span class="tn">${i+1}</span><span>${t}</span>`;
    tl.appendChild(li);
  });

  showScreen('screen-result');
}

// 이미지 저장
async function saveImage(){
  showToast('📸 이미지 생성 중...');
  try {
    const el = document.getElementById('result-capture');
    const canvas = await html2canvas(el, {scale: 2, useCORS: true, backgroundColor: '#ffffff'});
    const link = document.createElement('a');
    link.download = `지니어스_AI테스트_${resultType}_${userName}.png`;
    link.href = canvas.toDataURL('image/png');
    link.click();
    showToast('✅ 이미지가 저장됐어요!');
  } catch(e) {
    showToast('❌ 저장 실패. 다시 시도해보세요.');
  }
}

// 공유 기능 (카카오, 인스타, 복사)
function shareKakao(){ copyLink(true); }
function shareInsta(){ saveImage(); }
function copyLink(isKakao = false){
  const d = resultData[resultType];
  const msg = `${d.shareMsg}\n\n👉 테스트 해보기: ${SHARE_URL}`;
  
  if(navigator.clipboard && window.isSecureContext) {
    navigator.clipboard.writeText(msg);
  } else {
    const ta = document.createElement('textarea');
    ta.value = msg; ta.style.position = 'fixed'; ta.style.opacity = '0';
    document.body.appendChild(ta); ta.focus(); ta.select();
    try { document.execCommand('copy'); } catch(e){}
    document.body.removeChild(ta);
  }
  showToast(isKakao ? '💬 카카오 공유 문구가 복사됐어요!' : '🔗 링크가 복사됐어요!');
}

function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2600);
}

function retryTest(){
  document.getElementById('nameInput').value = '';
  document.getElementById('startBtn').disabled = true;
  showScreen('screen-start');
}
</script>
