<!DOCTYPE html>
<html lang="ko">
<head>
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-9NMXRP102X"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-9NMXRP102X');
  </script>

  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AI 활용능력 테스트</title>
  
  <style>
    @font-face {
        font-family: 'NeoDunggeunmo';
        src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_2001@1.3/NeoDunggeunmo.woff') format('woff');
        font-weight: normal;
        font-style: normal;
    }

    :root {
      --g1:#0f5c35; --g2:#1e8a52; --g3:#3ab870; --g4:#a8f0c6; --g5:#e8faf1;
      --orange:#f39c12; --red:#e74c3c;
      --black:#0c0c0c; --gray1:#2a2a2a; --gray2:#5a5a5a; --gray3:#b0b0b0;
      --gray4:#e4e4e4; --white:#ffffff;
      --fko:'NeoDunggeunmo', cursive, sans-serif;
      --fmono:'NeoDunggeunmo', monospace;
      --win-bg: #f0f0f0; --win-bar: #d4d4d4; --win-border: #000000; --green-box: #b4e0b4;
    }

    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html{scroll-behavior:smooth}
    body{
      font-family:var(--fko);
      background: linear-gradient(180deg, #c4e9f2 0%, #d4f0df 100%);
      color:var(--black); min-height:100vh; display:flex; align-items:flex-start; justify-content:center;
      padding:24px 16px 56px; overflow-x:hidden; position:relative;
    }
    body::before{
      content:''; position:fixed; inset:0;
      background-image: radial-gradient(#ffffff 2px, transparent 2px);
      background-size: 40px 40px; opacity: 0.3; z-index: 0; pointer-events: none;
    }

    .screen{width:100%; max-width:520px; position:relative; z-index:1; display:none}
    .screen.active{display:block; animation:fadeUp .4s ease-out both}
    @keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}

    /* ── 픽셀 UI 컴포넌트 ── */
    .pixel-window { border: 4px solid var(--win-border); background: var(--win-bg); box-shadow: 6px 6px 0 rgba(0,0,0,0.15); border-radius: 4px; overflow: hidden; margin-top: 20px; }
    .window-top-bar { background: var(--win-bar); border-bottom: 4px solid var(--win-border); display: flex; align-items: center; padding: 10px 14px; }
    .window-top-bar .dots { display: flex; gap: 6px; margin-right: 14px; }
    .window-top-bar .dot { width: 12px; height: 12px; border: 2px solid var(--win-border); background: #fff; }
    .window-top-bar .dot.red { background: #ff5f56; }
    .window-top-bar .dot.yellow { background: #ffbd2e; }
    .window-top-bar .dot.green { background: #27c93f; }
    .window-title { font-size: 14px; color: #333; text-align: center; flex: 1; letter-spacing: -0.05em; padding-right: 40px; }
    .window-body { padding: 30px 20px; background: #fff; border: 4px solid var(--win-border); margin: 16px; border-radius: 8px; position: relative; }
    .hero-illustration { position: relative; height: 160px; display: flex; justify-content: center; align-items: center; margin-bottom: 30px; }
    .floating-icon { position: absolute; font-size: 24px; animation: float 3s ease-in-out infinite; color: var(--g1); }
    @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-8px)} }
    .icon-chip1 { top: 20px; left: 20px; font-size: 28px; }
    .icon-q { top: 10px; right: 50px; font-size: 32px; color: #555; }
    .icon-bulb { bottom: 30px; left: 40px; font-size: 28px; color: #f5b041; }

    .robot-char {
      width: 100px; height: 110px; background: #e0e0e0; border: 4px solid var(--win-border); border-radius: 20px 20px 10px 10px;
      position: relative; z-index: 2; box-shadow: 4px 4px 0 rgba(0,0,0,0.1); display: flex; flex-direction: column; align-items: center; justify-content: flex-start; padding-top: 14px;
    }
    .robot-antenna { position: absolute; top: -16px; left: 50%; transform: translateX(-50%); width: 8px; height: 16px; background: #999; border: 3px solid var(--win-border); }
    .robot-antenna::before { content:''; position:absolute; top:-8px; left:-4px; width:10px; height:10px; background: var(--g1); border: 3px solid var(--win-border); border-radius: 50%; }
    .robot-face { width: 70px; height: 40px; background: #111; border: 4px solid var(--win-border); border-radius: 10px; display: flex; justify-content: center; align-items: center; gap: 12px; }
    .robot-eye { width: 12px; height: 14px; background: #fff; border-radius: 40%; }
    .robot-logo { margin-top: 8px; font-size: 10px; font-weight: bold; color: #800020; text-align: center; line-height: 1.1; }

    .action-row { display: flex; gap: 16px; justify-content: center; }
    .green-box { flex: 1; height: 54px; background: var(--green-box); border: 4px solid var(--win-border); border-radius: 8px; box-shadow: 4px 4px 0 rgba(0,0,0,0.15); display: flex; align-items: center; justify-content: center; }
    .name-input { width: 100%; height: 100%; border: none; background: transparent; text-align: center; font-family: var(--fko); font-size: 16px; outline: none; }
    .name-input::placeholder { color: #5a8a5a; }
    .btn-start { width: 100%; height: 100%; border: none; background: transparent; font-family: var(--fko); font-size: 18px; cursor: pointer; }
    .btn-start:disabled { color: #888; cursor: not-allowed; }

    .card { background: var(--white); border: 4px solid var(--win-border); border-radius: 8px; box-shadow: 6px 6px 0 rgba(0,0,0,0.15); padding: 30px 20px; }
    .progress-top { display: flex; justify-content: space-between; margin-bottom: 12px; font-size: 14px; }
    .pbar-bg { height: 12px; background: var(--gray4); border: 3px solid var(--win-border); border-radius: 6px; overflow: hidden; }
    .pbar-fill { height: 100%; background: var(--g1); transition: width 0.4s; }
    .q-text { font-size: 20px; line-height: 1.4; color: var(--black); margin-bottom: 30px; min-height: 60px; }
    .choice-btn { width: 100%; padding: 16px; border: 3px solid var(--win-border); border-radius: 8px; background: var(--white); font-family: var(--fko); font-size: 15px; text-align: left; cursor: pointer; display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
    .choice-btn:hover { background: var(--g5); transform: translateY(-2px); box-shadow: 6px 6px 0 rgba(0,0,0,0.15); }
    .cb { width: 28px; height: 28px; border: 3px solid var(--win-border); background: #fff; color: var(--g1); display: flex; align-items: center; justify-content: center; font-size: 14px; }

    /* ── 결과 화면 스타일 ── */
    #rRobotIllustration { position: relative; height: 120px; display: flex; justify-content: center; align-items: center; margin-bottom: 20px; }
    .result-hero { padding: 30px 20px; text-align: center; border-bottom: 4px solid var(--win-border); position: relative; overflow: hidden; color: #fff; }
    .rh-code { font-size: 40px; margin-bottom: 10px; text-shadow: 3px 3px 0 rgba(0,0,0,0.3); }
    .rh-name { font-size: 22px; margin-bottom: 10px; }
    .result-body { padding: 24px 20px; background: #fff; }
    .sec-title { font-size: 16px; color: var(--g1); margin-bottom: 14px; border-bottom: 2px dashed var(--gray4); padding-bottom: 8px; }
    .desc-box, .env-box { border: 3px solid var(--win-border); border-radius: 6px; padding: 16px; margin-bottom: 20px; font-size: 15px; line-height: 1.6; color: #000; background: var(--g5); }
    .env-box { background: #fff; }
    .tips-list { list-style: none; margin-bottom: 20px; display: flex; flex-direction: column; gap: 12px; font-size: 14px; color: #000; }
    .tips-list li { display: flex; gap: 10px; }
    .tn { width: 24px; height: 24px; flex-shrink: 0; background: var(--g1); color: #fff; border: 2px solid var(--win-border); display: flex; align-items: center; justify-content: center; font-size: 12px; }
    .closing-box { text-align: center; padding: 16px; background: var(--gray4); border: 3px solid var(--win-border); font-size: 14px; margin-bottom: 10px; color: #000; }
    .watermark { text-align: center; font-size: 12px; color: var(--gray3); padding: 10px 0; }
    .share-btn-save { width: 100%; padding: 16px; background: var(--g1); color: #fff; border: 4px solid var(--win-border); font-family: var(--fko); font-size: 18px; cursor: pointer; margin-bottom: 12px; }
    .share-row { display: flex; gap: 10px; margin-bottom: 12px; }
    .share-row button { flex: 1; padding: 14px; border: 3px solid var(--win-border); font-family: var(--fko); font-size: 14px; cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 6px; color: #000; background: #e0e0e0; }
    .share-btn-kakao { background: #fee500; }
    .toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: var(--win-border); color: #fff; padding: 12px 24px; font-size: 14px; border-radius: 4px; opacity: 0; pointer-events: none; transition: 0.3s; z-index: 999; }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(-10px); }

    /* 결과 로봇별 스타일 */
    .fepc-result .result-hero { background: var(--g1); }
    .fipu-result .result-hero { background: #c0392b; }
    .result-robot.rilu { background: var(--g5); border-color: var(--g1); }
  </style>
</head>
<body>
  <div class="toast" id="toast"></div>

  <div class="screen active" id="screen-start">
    <div class="pixel-window">
      <div class="window-top-bar">
        <div class="dots"><span class="dot red"></span><span class="dot yellow"></span><span class="dot green"></span></div>
        <div class="window-title">당신의 AI 사용 습관, 환경에 어떤 영향을 줄까요?</div>
      </div>
      <div class="window-body">
        <div class="hero-illustration">
          <div class="floating-icon icon-chip1">🖧</div>
          <div class="floating-icon icon-q">❓</div>
          <div class="floating-icon icon-bulb">💡</div>
          <div class="robot-char main-robot">
            <div class="robot-antenna"></div>
            <div class="robot-face"><div class="robot-eye"></div><div class="robot-eye"></div></div>
            <div class="robot-logo">LG ESG<br>ACADEMY</div>
          </div>
        </div>
        <div class="action-row">
          <div class="green-box"><input type="text" id="nameInput" class="name-input" placeholder="이름 입력" maxlength="10" autocomplete="off"/></div>
          <div class="green-box"><button class="btn-start" id="startBtn" disabled onclick="startTest()">시작하기</button></div>
        </div>
      </div>
    </div>
  </div>

  <div class="screen" id="screen-test">
    <div class="card">
      <div class="progress-wrap">
        <div class="progress-top"><span class="progress-cat" id="progressCat">상황 판단</span><span class="progress-num" id="progressNum">1 / 20</span></div>
        <div class="pbar-bg"><div class="pbar-fill" id="pbarFill" style="width:5%"></div></div>
      </div>
      <div class="q-num" id="qNum">Q 01</div>
      <p class="q-text" id="qText"></p>
      <div class="choices">
        <button class="choice-btn" id="choiceA" onclick="selectChoice(0)"><span class="cb">A</span><span id="choiceATxt"></span></button>
        <button class="choice-btn" id="choiceB" onclick="selectChoice(1)"><span class="cb">B</span><span id="choiceBTxt"></span></button>
      </div>
    </div>
  </div>

  <div class="screen" id="screen-loading">
    <div class="card loading-card">
      <div class="spinner">⏳</div>
      <h2 style="font-size:20px; margin-bottom:10px; color:#000;">결과 분석 중...</h2>
    </div>
  </div>

  <div class="screen" id="screen-result">
    <div id="result-capture" style="border: 4px solid #000; border-radius: 8px; overflow: hidden;">
      <div class="result-hero">
        <div id="rRobotIllustration"></div>
        <div class="rh-code" id="rTypeCode"></div>
        <div class="rh-name" id="rTypeName"></div>
        <div class="rh-greet" id="rGreet"></div>
      </div>
      <div class="result-body">
        <div class="sec-title">▶ 유형 설명</div>
        <div class="desc-box">
          <div id="rAnalogy" style="font-weight:bold; color:var(--g1); margin-bottom:8px;"></div>
          <div id="rPattern" style="margin-bottom:8px;"></div>
          <div id="rPunch" style="color:#666; font-size:13px;"></div>
        </div>
        <div class="sec-title">▶ 환경 영향</div>
        <div class="env-box">
          <div class="env-level" id="rImpact" style="font-weight:bold; color:var(--g1); margin-bottom:8px;"></div>
          <div id="rWater" style="font-size:14px; line-height:1.5;"></div>
          <div id="rDropBar" style="font-size: 24px; margin-top:10px; letter-spacing: 2px;"></div>
        </div>
        <div class="sec-title">▶ 개선 팁</div>
        <ul class="tips-list" id="rTips"></ul>
        <div class="closing-box" id="rClosing"></div>
        <div class="watermark">LG ESG 대학생 아카데미 '지니어스'</div>
      </div>
    </div>
    <div class="share-area">
      <button class="share-btn-save" onclick="saveImage()">📸 이미지로 저장하기</button>
      <div class="share-row">
        <button class="share-btn-kakao" onclick="shareKakao()">💬<br>카톡 공유</button>
        <button class="share-btn-insta" onclick="shareInsta()">📷<br>인스타 공유</button>
        <button class="share-btn-copy" onclick="copyLink()">🔗<br>링크 복사</button>
      </div>
      <button class="retry-btn" onclick="retryTest()" style="width: 100%; padding: 14px; background: transparent; border: 3px dashed #000; font-family: var(--fko); cursor: pointer;">↩ 처음으로 돌아가기</button>
    </div>
  </div>

  <script>
    let userName='', currentQ=0, resultType='';
    let scores={F:0,R:0,E:0,I:0,P:0,L:0,C:0,U:0};
    const SHARE_URL='https://byeolgome.github.io/lge_esg_academy/'; 

    const questions=[
      {cat:'상황 판단',text:'과제 작성을 시작할 때, 가장 먼저 하는 행동은?',choices:[{txt:'일단 AI를 켜두고 무엇이든 물어보며 시작한다',score:'F'},{txt:'빈 화면에 내 생각을 먼저 정리하고, 막힐 때 찾는다',score:'R'}]},
      {cat:'상황 판단',text:'문서나 이메일을 써야 할 때 나의 스타일은?',choices:[{txt:'처음부터 AI에게 초안을 잡아달라고 맡긴다',score:'F'},{txt:'내가 먼저 쓰고, 문맥 다듬을 때만 활용한다',score:'R'}]},
      {cat:'상황 판단',text:'간단한 개념이 궁금해졌을 때?',choices:[{txt:'대화형 AI에게 물어보고 맥락까지 설명해달라고 한다',score:'F'},{txt:'가벼운 정보는 그냥 구글링 등으로 빠르게 찾는다',score:'R'}]},
      {cat:'상황 판단',text:'오늘 하루 동안 AI 서비스를 켠 횟수는?',choices:[{txt:'셀 수 없다. 수시로 탭을 왔다 갔다 하며 사용했다',score:'F'},{txt:'필요할 때 한두 번 정도 몰아서 접속했다',score:'R'}]},
      {cat:'상황 판단',text:'아이디어가 필요할 때 나는?',choices:[{txt:'AI에게 여러 키워드를 던져주고 아이디어를 내보라고 한다',score:'F'},{txt:'혼자 먼저 고민해보고, 정 안 풀릴 때 힌트를 얻는다',score:'R'}]},
      {cat:'행동 방식',text:'AI에게 무언가를 부탁할 때 첫 질문의 형태는?',choices:[{txt:'배경, 조건 등을 꼼꼼히 적어서 한 번에 준다',score:'E'},{txt:'일단 핵심만 짧게 던지고 대화하며 맞춰간다',score:'I'}]},
      {cat:'행동 방식',text:'AI가 엉뚱한 대답을 내놓았을 때 나의 대처법은?',choices:[{txt:'질문을 구체적으로 수정해서 다시 보낸다',score:'E'},{txt:'"아니 그거 말고"라며 대화로 계속 맞춰간다',score:'I'}]},
      {cat:'행동 방식',text:'원하는 결과를 얻기까지 AI와 대화하는 횟수는?',choices:[{txt:'보통 1~2번의 질문 안에 완벽한 답변을 얻는다',score:'E'},{txt:'여러 번 핑퐁을 해야 겨우 쓸만한 게 나온다',score:'I'}]},
      {cat:'행동 방식',text:'자주 쓰는 질문이나 보고서 양식이 있다면?',choices:[{txt:'프롬프트 템플릿을 저장해두고 효율적으로 쓴다',score:'E'},{txt:'매번 그때그때 생각나는 대로 타이핑한다',score:'I'}]},
      {cat:'행동 방식',text:'AI 답변이 너무 장황하게 나왔을 때 나는?',choices:[{txt:'다음부턴 요약 제약 등을 미리 건다',score:'E'},{txt:'일단 받은 뒤에 "짧게 줄여줘"라고 다시 시킨다',score:'I'}]},
      {cat:'작업 스타일',text:'AI에게 주로 시키는 업무의 스케일은?',choices:[{txt:'데이터 분석, 전체 기획 등 묵직한 작업',score:'P'},{txt:'맞춤법 검사, 단순 요약 등 가벼운 작업',score:'L'}]},
      {cat:'작업 스타일',text:'방대한 양의 문서를 분석해야 할 때?',choices:[{txt:'문서를 통째로 업로드하고 요약해달라고 한다',score:'P'},{txt:'내가 훑어본 뒤 특정 문단만 물어본다',score:'L'}]},
      {cat:'작업 스타일',text:'이미지나 영상 등 시각 자료가 필요할 때?',choices:[{txt:'생성형 AI를 적극 활용해 만들어낸다',score:'P'},{txt:'무료 이미지 사이트 검색 등으로 대체한다',score:'L'}]},
      {cat:'작업 스타일',text:'AI가 만든 결과물을 활용하는 방식은?',choices:[{txt:'AI가 만든 결과물을 거의 그대로 적용한다',score:'P'},{txt:'뼈대만 참고하고 최종 완성은 내 손으로 한다',score:'L'}]},
      {cat:'작업 스타일',text:'내가 생각하는 AI의 역할에 더 가까운 것은?',choices:[{txt:'내 일을 대신 처리해 주는 든든한 실무 파트너',score:'P'},{txt:'막힌 길의 방향만 살짝 알려주는 나침반',score:'L'}]},
      {cat:'가치관',text:'AI 질문에 엄청난 자원이 쓰인다는 기사를 봤다면?',choices:[{txt:'"불필요한 핑퐁을 많이 하나?" 돌아본다',score:'C'},{txt:'"기술이 해결하겠지" 하며 넘긴다',score:'U'}]},
      {cat:'가치관',text:'이미 해결된 질문 창을 대하는 태도는?',choices:[{txt:'서버 부하를 생각해 창을 닫거나 신중해진다',score:'C'},{txt:'켜둔 채로 나중에 아무 말이나 던져본다',score:'U'}]},
      {cat:'가치관',text:'가벼운 모델과 고성능 모델을 고를 수 있다면?',choices:[{txt:'단순 작업은 자원 소모가 적은 가벼운 모델을 쓴다',score:'C'},{txt:'무조건 가장 똑똑한 최신 고성능 모델만 쓴다',score:'U'}]},
      {cat:'가치관',text:'AI 유머 밈 생성 등 가벼운 유행이 돌 때?',choices:[{txt:'자원 소모가 살짝 스친다',score:'C'},{txt:'재밌으면 망설임 없이 다 해본다',score:'U'}]},
      {cat:'가치관',text:'나의 습관이 탄소 배출과 연결된다는 걸 알았다.',choices:[{txt:'효율적으로 고칠 의향이 있다',score:'C'},{txt:'하던 대로 쓸 것 같다',score:'U'}]}
    ];

    const resultData={
      FEPC:{title:'그린 파워유저',emoji:'🌿', analogy:'AI를 오차 없이 능숙하게 다룹니다.', pattern:'질문이 완벽해 서버 공회전을 막는 이상적인 패턴.', punch:'능력과 환경 감수성을 갖춘 실력자 👏', impact:'아주 낮음 🌱', water:'하루 물 1컵 소모', drops:2, tips:['완벽한 프롬프트 능력이 에너지를 아낍니다.','가끔은 디지털 디톡스를 해보세요.','저탄소 질문법을 팀원들에게 공유해주세요!'], closing:'지구를 위한 최고의 에코 마스터 🌍', color:'#0f5c35'},
      FIPU:{title:'AI 과소비러',emoji:'🚨', analogy:'한겨울에 보일러와 에어컨을 같이 켭니다.', pattern:'무의식, 잦음, 비효율. 자원 낭비 4관왕.', punch:'북극곰에게 10초간 묵념하세요 🚨', impact:'아주 높음 🔥🔥', water:'하루 생수 4~5병 소모', drops:10, tips:['질문 횟수를 스스로 제한해보세요.','엔터 키의 무게를 느껴보세요.','빙하가 냉각수로 다 녹아버릴 거예요!'], closing:'프롬프트 다이어트를 시작하세요 🌱', color:'#c0392b'},
      RILU:{title:'디지털 자연인',emoji:'🌲', analogy:'아날로그의 가치를 더 잘 아는 사람입니다.', pattern:'탄소 배출량 0에 수렴하는 궁극의 친환경 패턴!', punch:'지구를 앞장서서 지키고 있는 겁니다 🌲', impact:'완벽 (무해) 🌱🌱🌱', water:'물 소비 0! 북극곰의 기립박수', drops:0, tips:['아날로그의 힘을 굳게 믿으세요.','나중에 꼭 필요할 땐 한 번에 묻는 연습을 해보세요.','이대로의 삶을 즐기세요!'], closing:'북극곰의 영원한 깐부 🐻‍❄️', color:'#1e8a52'}
      // (나머지 유형 데이터는 동일한 방식으로 이어서 채워주시면 됩니다)
    };

    function startTest(){
      userName = document.getElementById('nameInput').value.trim();
      showScreen('screen-test');
      renderQ();
    }

    function renderQ(){
      const q = questions[currentQ];
      document.getElementById('pbarFill').style.width = Math.round((currentQ/questions.length)*100) + '%';
      document.getElementById('qText').textContent = q.text;
      document.getElementById('choiceATxt').textContent = q.choices[0].txt;
      document.getElementById('choiceBTxt').textContent = q.choices[1].txt;
    }

    function selectChoice(idx){
      scores[questions[currentQ].choices[idx].score]++;
      currentQ++;
      if(currentQ < questions.length) renderQ();
      else { showScreen('screen-loading'); setTimeout(showResult, 1800); }
    }

    function showResult(){
      resultType = (scores.F>=scores.R?'F':'R')+(scores.E>=scores.I?'E':'I')+(scores.P>=scores.L?'P':'L')+(scores.C>=scores.U?'C':'U');
      const d = resultData[resultType] || resultData.FEPC; // 폴백
      
      document.getElementById('screen-result').style.backgroundColor = d.color;
      document.getElementById('rRobotIllustration').innerHTML = `<div class="robot-char"><div class="robot-face"><div class="robot-eye"></div></div><div class="robot-logo">LG ESG<br>Genius</div></div>`;
      document.getElementById('rTypeCode').textContent = resultType;
      document.getElementById('rTypeName').textContent = `${d.emoji} ${d.title}`;
      document.getElementById('rGreet').textContent = `${userName}님의 AI 활용 유형`;
      document.getElementById('rAnalogy').textContent = d.analogy;
      document.getElementById('rPattern').textContent = d.pattern;
      document.getElementById('rPunch').textContent = `"${d.punch}"`;
      document.getElementById('rImpact').textContent = d.impact;
      document.getElementById('rWater').innerHTML = `당신의 습관은 <strong>${d.water}</strong> 수준입니다.`;
      
      let drops = ''; for(let i=0; i<10; i++) drops += (i < d.drops) ? '💧' : '🩶';
      document.getElementById('rDropBar').innerHTML = drops;
      
      let tips = ''; d.tips.forEach((t, i) => tips += `<li><span class="tn">${i+1}</span><span>${t}</span></li>`);
      document.getElementById('rTips').innerHTML = tips;
      document.getElementById('rClosing').textContent = d.closing;
      showScreen('screen-result');
    }

    function showScreen(id){ document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active')); document.getElementById(id).classList.add('active'); }
    async function saveImage(){ showToast('📸 이미지 생성 중...'); const el = document.getElementById('result-capture'); const canvas = await html2canvas(el, {scale: 2, useCORS: true}); const link = document.createElement('a'); link.download = `지니어스_결과.png`; link.href = canvas.toDataURL(); link.click(); }
    function copyLink(){ navigator.clipboard.writeText(`나의 AI 유형은? ${SHARE_URL}`); showToast('🔗 링크가 복사됐어요!'); }
    function showToast(msg){ const t = document.getElementById('toast'); t.textContent = msg; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'), 2000); }
    function retryTest(){ location.reload(); }
  </script>
</body>
